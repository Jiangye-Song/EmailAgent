# Local development stack
# - PostgreSQL 16 + pgvector (mirrors Alibaba Cloud PolarDB schema)
#
# OSS is skipped in Phase 1:
#   - Email attachment URLs are stored as JSONB in email_records
#   - Digest exports are stored as JSONB in digest_exports table
#   - Alibaba Cloud OSS added in Phase 2 for production
#
# Usage:
#   docker compose up -d
#   docker compose down -v   # also removes volumes

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: email-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: email_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d email_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
